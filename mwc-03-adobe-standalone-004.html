    <script>
      document.addEventListener('DOMContentLoaded', function () {
        // Stagger by adding .loaded at intervals — triggers animation-play-state: running
        // on each element independently via @keyframes featureFadeIn.
        var els = [
          '.feature-animation-one',
          '.feature-animation-two',
          '.feature-animation-three',
          '.feature-animation-four',
          '.feature-animation-five',
          '.feature-animation-six',
          '.feature-animation-seven'
        ];
        els.forEach(function (sel, i) {
          var el = document.querySelector(sel);
          if (el) setTimeout(function () { el.classList.add('loaded'); }, 200 + i * 200);
        });
      });
    </script>
    <script>
      (function () {

        // ── Video stop helper (Vimeo iframes + local <video> elements) ──────────
        function stopAllVideos(modal) {
          // Stop Vimeo iframes by reassigning src
          var iframe = modal.querySelector('iframe[src*="vimeo.com"]');
          if (iframe) {
            iframe.src = iframe.src;
          }
          // Stop locally hosted <video> elements
          modal.querySelectorAll('video').forEach(function (video) {
            video.pause();
            video.currentTime = 0;
          });
        }

        // ── Video play helper — rewinds and plays all <video> elements in a modal ─
        function playAllVideos(modal) {
          modal.querySelectorAll('video').forEach(function (video) {
            video.currentTime = 0;
            video.play();
          });
        }

        // ── Modal: close a modal cleanly ─────────────────────────────────────────
        function closeModal(modal) {
          if (!modal) return;
          modal.style.display = 'none';
          stopAllVideos(modal);
        }

        // ── Modal setup (runs after DOM ready) ───────────────────────────────────
        document.addEventListener('DOMContentLoaded', function () {

          // --- Close buttons ---
          document.querySelectorAll('.close-modal, .close-modal-video').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
              e.stopPropagation(); // prevent backdrop handler from double-firing
              closeModal(btn.closest('.modal'));
            });
          });

          // --- Open buttons ---
          document.querySelectorAll('[class*="open-modal"]').forEach(function (btn) {
            btn.addEventListener('click', function () {
              var modalClass = Array.from(btn.classList).find(function (c) {
                return c.startsWith('open-modal');
              });
              if (!modalClass) return;
              var suffix = modalClass.replace('open-modal', ''); // e.g. "-video-1"
              var modalId;

              var videoMatch = suffix.match(/^-video(-(\d+))?$/);
              if (videoMatch) {
                modalId = 'customModalVideo' + (videoMatch[2] || '');
              } else if (suffix) {
                modalId = 'customModal' + suffix.replace(/^-/, '');
              } else {
                modalId = 'customModal';
              }

              var modal = document.getElementById(modalId);
              if (modal) {
                modal.style.display = 'flex';
                // Start playback only when the user opens the modal
                playAllVideos(modal);
              }
            });
          });

          // --- Backdrop close: fires on mousedown so it doesn't race with the
          //     page-transition click interceptor (which runs on click at capture).
          //     Only closes when clicking the .modal backdrop element itself —
          //     NOT any of its children — preventing accidental closes. ---
          document.addEventListener('mousedown', function (e) {
            if (e.target.classList && e.target.classList.contains('modal')) {
              closeModal(e.target);
            }
          });

          // --- ESC key ---
          document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
              document.querySelectorAll('.modal').forEach(function (modal) {
                closeModal(modal);
              });
            }
          });

        });


        // ── Page Transition ───────────────────────────────────────────────────────

        var BG_PREFIX_MAP = [
          { prefix: 'mwc-01', slug: 'bmc' },
          { prefix: 'mwc-02', slug: 'bmc-helix' },
          { prefix: 'mwc-03', slug: 'adobe' },
          { prefix: 'mwc-04', slug: 'hitachi' },
          { prefix: 'mwc-05', slug: 'confluent' },
          { prefix: 'mwc-011', slug: 'microsoft' },
        ];

        var DEFAULT_BG = 'public/images/img-bg-infosys-mwc-home-01-1500w.jpg';

        function getBackgroundImage(pathname) {
          var filename = (pathname || window.location.pathname)
            .split('/').pop().replace(/\.html?$/i, '');
          for (var i = 0; i < BG_PREFIX_MAP.length; i++) {
            var entry = BG_PREFIX_MAP[i];
            if (filename.indexOf(entry.prefix) === 0 &&
                (filename.length === entry.prefix.length || /[-_]/.test(filename[entry.prefix.length]))) {
              return 'public/images/img-bg-infosys-' + entry.slug + '-01-1500w.jpg';
            }
          }
          return DEFAULT_BG;
        }

        var STYLE_ID  = 'page-fade-style';
        var currentBg = getBackgroundImage();

        function buildCSS(bgImage) {
          return `
            html, body {
              background:
                linear-gradient(279deg, rgba(0, 0, 0, 0.40) 10%, rgba(0, 0, 0, 0.40) 60%),
                url("${bgImage}") center center / cover no-repeat fixed;
              overflow-x: hidden;
            }

            [data-role="BurgerMenu"],
            [data-role="MobileMenu"],
            [data-role="CloseMobileMenu"] {}

            .js body.nav-hidden [data-role="BurgerMenu"],
            .js body.nav-hidden [data-role="MobileMenu"],
            .js body.nav-hidden [data-role="CloseMobileMenu"] {
              visibility: hidden !important;
              opacity: 0 !important;
              pointer-events: none !important;
            }

            body.page-fade-prep { opacity: 0; filter: blur(6px); }
            body.page-fade-in   { opacity: 1; filter: blur(0); transition: opacity .8s ease-in-out, filter 1s ease-out; }
            body.page-fade-out  { opacity: 0 !important; filter: blur(8px); transition: opacity .55s ease-in-out, filter .7s ease-in; }

            body { will-change: opacity, filter; }

            @media (prefers-reduced-motion: reduce) {
              body.page-fade-prep, body.page-fade-in, body.page-fade-out {
                transition: none !important;
                filter: none !important;
                opacity: 1 !important;
              }
            }
          `;
        }

        function injectStyle(bgImage) {
          bgImage = bgImage || currentBg;
          var existing = document.getElementById(STYLE_ID);
          if (existing) {
            existing.textContent = buildCSS(bgImage);
          } else {
            var style = document.createElement('style');
            style.id = STYLE_ID;
            style.textContent = buildCSS(bgImage);
            document.head.appendChild(style);
          }
        }

        // Inject immediately — before any paint so background is set from frame 1
        document.documentElement.classList.add('js');
        injectStyle();

        function setNavHidden(on) {
          if (!document.body) return;
          document.body.classList.toggle('nav-hidden', !!on);
        }

        function ensureBodyPrep() {
          if (!document.body) return;
          document.body.classList.add('page-fade-prep');
          setNavHidden(true);
        }

        ensureBodyPrep();
        if (!document.body) {
          document.addEventListener('DOMContentLoaded', ensureBodyPrep, { once: true });
        }

        function waitForBg(src) {
          return new Promise(function (resolve) {
            var img   = new window.Image();
            var done  = false;
            var timer = setTimeout(function () {
              if (!done) { done = true; resolve(); }
            }, 1500);
            img.onload = img.onerror = function () {
              if (!done) { done = true; clearTimeout(timer); resolve(); }
            };
            img.src = src;
          });
        }

        function triggerFadeIn() {
          if (!document.body) return;
          document.documentElement.classList.add('hydrated');
          document.body.classList.remove('page-fade-out');
          document.body.classList.remove('page-fade-prep');
          setNavHidden(false);
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              document.body.classList.add('page-fade-in');
            });
          });
        }

        function hydrateNow() {
          currentBg = getBackgroundImage();
          injectStyle(currentBg);
          waitForBg(currentBg).then(function () {
            triggerFadeIn();
          });
        }

        window.addEventListener('pageshow', function () {
          hydrateNow();

          BG_PREFIX_MAP.forEach(function (entry) {
            var img = new window.Image();
            img.src = 'public/images/img-bg-infosys-' + entry.slug + '-01-1500w.jpg';
          });
          var defImg = new window.Image();
          defImg.src = DEFAULT_BG;
        });

        document.addEventListener('DOMContentLoaded', function () {
          setTimeout(function () {
            if (!document.documentElement.classList.contains('hydrated')) hydrateNow();
          }, 150);
        }, { once: true });

        // ── Modal-aware guard for page transition click interceptor ───────────────
        // Also guards direct .modal backdrop clicks (e.target IS .modal element).
        function isModalRelatedClick(e, a) {
          var t = e.target;
          if (t.classList && t.classList.contains('modal')) return true; // backdrop
          if (t.closest('.modal'))                return true;
          if (t.closest('[class*="open-modal"]')) return true;
          if (t.closest('.close-modal'))          return true;
          if (t.closest('.close-modal-video'))    return true;
          var href = a ? a.getAttribute('href') : null;
          if (href && href.startsWith('#'))       return true;
          return false;
        }

        // Runs at capture phase so it sees clicks before bubble-phase handlers.
        document.addEventListener('click', function (e) {
          if (e.defaultPrevented || e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;

          if (!a) return;

          // Pass modal-related clicks straight through untouched
          if (isModalRelatedClick(e, a)) return;

          var href = a.getAttribute('href');
          if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('javascript:')) return;
          if (a.hasAttribute('download') || a.target === '_blank') return;

          var url = new URL(a.href, window.location.href);
          var sameOrigin     = url.origin === window.location.origin;
          var sameDocHashOnly = (url.pathname === window.location.pathname && url.search === window.location.search && url.hash);
          if (!sameOrigin || sameDocHashOnly) return;

          e.preventDefault();

          // Start preloading the next page's bg immediately during fade-out
          var nextImg = new window.Image();
          nextImg.src = getBackgroundImage(url.pathname);

          setNavHidden(true);
          document.body.classList.remove('page-fade-in');
          document.body.classList.add('page-fade-out');

          setTimeout(function () {
            window.location.href = a.href;

        }, { capture: true });

          if (!document.body) return;
          setNavHidden(true);
          document.body.classList.remove('page-fade-in');
          document.body.classList.add('page-fade-out');
